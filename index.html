    <title>History Reimagined | Historical Diets Library</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

:root { 
    --primary: #FFD700; 
    --bg-dark: #0A0A0A; 
}

h1, h2, h3, .brand-name {
    font-family: 'Cinzel', serif !important;
    text-transform: uppercase;
    letter-spacing: 2px;
}
        :root { 
            --primary: #FFD700; 
            --accent: #FFC000; 
            --bg-dark: #0A0A0A; 
            --bg-card: #141414; 
            --text-main: #FFFFFF; 
            --text-head: #FFD700; 
            --text-sec: #CCCCCC; 
        }

        body { 
            font-family: 'Georgia', serif; 
            line-height: 1.8; 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            background: var(--bg-dark); 
        }
        
<header style="background: var(--bg-dark); padding: 40px 20px; border-bottom: 2px solid var(--primary); text-align: center;">
    <a href="index.html" style="text-decoration: none;">
        <img src="logo.png" alt="History Reimagined Logo" style="height: 100px; width: auto; margin-bottom: 10px;">
        <div class="brand-name" style="color: var(--primary); font-size: 2rem; font-weight: 700;">History Reimagined</div>
    </a>
</header>
        }

        nav { 
            background: var(--bg-card); 
            text-align: center; 
            border-bottom: 1px solid #333;
        }
        nav a { 
            display: inline-block; 
            padding: 15px 20px; 
            color: var(--text-main); 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
        }
        nav a:hover { color: var(--accent); }

        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }

        h1 { color: var(--text-head); text-align: center; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        
        .diet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .diet-item {
            background: var(--bg-card);
            border: 1px solid #222;
            border-radius: 12px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            overflow: hidden;
        }

        .diet-item:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.1);
        }

        .diet-thumb {
            width: 100%;
            height: 280px; 
            object-fit: cover;
            border-bottom: 1px solid #222;
        }

        .diet-info {
            padding: 20px;
        }

        .diet-info h3 {
            color: var(--text-head);
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }

        .diet-info p {
            color: var(--text-sec);
            font-size: 1rem;
            margin: 0;
            line-height: 1.5;
        }

        .coming-soon {
            background: #0f0f0f;
            border: 1px dashed #333;
            border-radius: 12px;
            padding: 60px;
            text-align: center;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }

        footer { 
            text-align: center; 
            padding: 60px; 
            font-size: 0.8rem; 
            color: #666; 
            border-top: 1px solid #222;
            margin-top: 80px;
        }
        footer a { color: #666; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<header>
    <h1>History Reimagined</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h1>The Library of Ancient Eating</h1>

    <div class="diet-grid">
        
        <a href="fdr-diet.html" class="diet-item">
            <img src="fdr-portrait.jpg" alt="FDR Portrait" class="diet-thumb">
            <div class="diet-info">
                <h3>F.D. Roosevelt</h3>
                <p>The 32nd President's surprising journey through Depression-era dining.</p>
            </div>
        </a>

        <div class="coming-soon">
            Next historical figure arriving soon...
        </div>

    </div>
</div>

<footer>
    <p>&copy; 2026 History Reimagined | <a href="credits.html">Image Credits</a> | <a href="privacy.html">Privacy Policy</a></p>
</footer>

</body>
</html>
