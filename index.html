<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SHRTBYB6Y0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SHRTBYB6Y0');
    </script>

    <title>History Reimagined | Historical Diets Library</title>
    <style>
        :root { 
            --primary: #FFD700; 
            --accent: #FFC000; 
            --bg-dark: #0A0A0A; 
            --bg-card: #141414; 
            --text-main: #FFFFFF; 
            --text-head: #FFD700; 
            --text-sec: #CCCCCC; 
        }

        body { 
            font-family: 'Georgia', serif; 
            line-height: 1.8; 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            background: var(--bg-dark); 
        }
        
        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Highlighted Header Style */
        header { 
            background: var(--bg-dark); 
            padding: 15px 0; 
            border-bottom: 2px solid var(--primary);
            text-align: center;
        }

        .header-logo {
            height: 70px;
            width: 70px;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            margin: 0 auto;
            /* The "Highlighted" Style from the About page */
            border: 3px solid var(--primary);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            transition: 0.3s;
        }

        .header-logo:hover {
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
            transform: scale(1.05);
        }

        nav { 
            background: var(--bg-card); 
            text-align: center; 
            border-bottom: 1px solid #333;
        }

        nav a { 
            display: inline-block; 
            padding: 12px 18px; 
            color: var(--text-main); 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            font-family: 'Cinzel', serif;
        }

        nav a:hover { color: var(--accent); }

        .container { 
            max-width: 900px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }

        .page-title { 
            color: var(--text-head); 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 1.5rem;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }
        
        .diet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .diet-item {
            background: var(--bg-card);
            border: 1px solid #222;
            border-radius: 12px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            overflow: hidden;
        }

        .diet-item:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.1);
        }

        .diet-thumb {
            width: 100%;
            height: 250px; 
            object-fit: cover;
            border-bottom: 1px solid #222;
        }

        .diet-info {
            padding: 20px;
        }

        .diet-info h3 {
            color: var(--text-head);
            margin: 0 0 10px 0;
            font-size: 1.3rem;
        }

        .diet-info p {
            color: var(--text-sec);
            font-size: 1rem;
            margin: 0;
            line-height: 1.5;
        }

        .coming-soon {
            background: #0f0f0f;
            border: 1px dashed #333;
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            font-family: 'Cinzel', serif;
        }

        footer { 
            text-align: center; 
            padding: 50px; 
            font-size: 0.75rem; 
            color: #666; 
            border-top: 1px solid #222;
            margin-top: 60px;
        }
        footer a { color: #666; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<header>
    <a href="index.html">
        <img src="logo.png" alt="History Reimagined Logo" class="header-logo">
    </a>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h2 class="page-title">The Library of Ancient Eating</h2>

    <div class="diet-grid">
        
        <a href="/fdr-diet.html">F.D. Roosevelt</a>
            <img src="fdr-portrait.jpg" alt="FDR Portrait" class="diet-thumb">
            <div class="diet-info">
                <h3>F.D. Roosevelt</h3>
                <p>Scrambled eggs, Dirty Martinis, and the surprising 7-cent White House lunch.</p>
            </div>
        </a>

        <div class="coming-soon">
            Next historical figure arriving soon...
        </div>

    </div>
</div>

<footer>
    <p>&copy; 2026 History Reimagined | <a href="credits.html">Image Credits</a> | <a href="privacy.html">Privacy Policy</a></p>
</footer>

</body>
</html>
